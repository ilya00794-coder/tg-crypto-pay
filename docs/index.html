<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Crypto Pay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background-color: #17212b; 
            color: white; 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
    </style>
</head>
<body>
    <div id="debug-info">
        <h1>🚀 Crypto Pay</h1>
        <p>Идет загрузка...</p>
        <div id="error-log"></div>
    </div>
    <div id="root"></div>
    
    <script type="module">
        // Перехват ошибок
        window.addEventListener('error', (event) => {
            const errorLog = document.getElementById('error-log');
            errorLog.innerHTML += `<p style="color: red;">Error: ${event.message} at ${event.filename}:${event.lineno}</p>`;
            console.error('Catch error:', event);
        });

        // Логирование 
        console.log('Страница загружена');
        
        // Импорт React и App
        import React from './src/react.js';
        import ReactDOM from './src/react-dom.js';
        import App from './src/App.tsx';

        console.log('Модули импортированы');

        try {
            ReactDOM.createRoot(document.getElementById('root')).render(
                React.createElement(App)
            );
            console.log('Рендеринг завершен');
        } catch (e) {
            console.error('Ошибка рендеринга:', e);
            const errorLog = document.getElementById('error-log');
            errorLog.innerHTML += `<p style="color: red;">Render Error: ${e.message}</p>`;
        }
    </script>
</body>
</html>
